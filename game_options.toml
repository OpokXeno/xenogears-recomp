# game_options.toml — Xenogears persist-options hooks (defaults: none).
# Consumed by psxrecomp-game (main_psx.cpp) via load_game_options(): each
# [[option]] maps one in-RAM option field (name/addr/size, optional
# init_store_pc + min/max validation) so settings persist across restarts.
# Empty for now — no Xenogears option addresses are known yet (Track B work).
# Example (from the schema in config_loader.cpp):
# [[option]]
# name = "vibration"
# addr = "0x800XXXXX"
# size = 1
# init_store_pc = "0x800YYYYY"
# max = 1
